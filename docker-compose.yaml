x-postgres-image: &pg-image postgres:${POSTGRES_VERSION:-18.1-alpine}

services:
  synapse:
    image: docker.io/matrixdotorg/synapse:v1.147.0
    restart: unless-stopped
    volumes:
      - synapse_data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - net
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: *pg-image
    restart: unless-stopped
    volumes:
      - synapse_db:/var/lib/postgresql
    networks:
      - net
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  element:
    image: vectorim/element-web:v1.12.10
    restart: unless-stopped
    volumes:
      - ./element/element-config.json:/app/config.json
    networks:
      - net
    depends_on:
      synapse:
        condition: service_healthy

  nginx:
    image: nginx:1.29.5-alpine
    restart: unless-stopped
    ports:
      - "${LOCAL_IP}:80:80"
      - "${LOCAL_IP}:8448:8448"  # Federation port
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      synapse:
        condition: service_healthy
      element:
        condition: service_started
    networks:
      - net
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Automated backup sidecar (standardized across services; see also services/parvis).
  # Matrix has TWO datastores, so backup.sh runs both workers each cycle:
  #   - synapse Postgres DB  -> matrix_db_*.dump     (restore with restore_db.sh)
  #   - synapse_data volume  -> matrix_data_*.tar.gz (restore with restore_data.sh)
  #     (media store + homeserver signing key + local config — none of which live in PG)
  # Runs once at startup, then on BACKUP_CRON_SCHEDULE via dcron. Backups land on the
  # matrix_backups volume (NAS-backed via overrides/matrix.override.yaml).
  # Manual ops:
  #   docker compose exec backup /scripts/backup.sh                  # back up now
  #   docker compose exec backup ls -lh /backups/                    # list backups
  #   docker compose exec backup /scripts/restore_db.sh   /backups/matrix_db_YYYY-MM-DD_HH-MM-SS.dump
  #   docker compose exec backup /scripts/restore_data.sh /backups/matrix_data_YYYY-MM-DD_HH-MM-SS.tar.gz
  #   (stop synapse before a data restore; restart synapse after either restore)
  backup:
    image: *pg-image
    container_name: matrix-backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SERVICE_NAME=matrix
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_DIR=/backups
      - DATA_DIR=/data
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_CRON_SCHEDULE=${BACKUP_CRON_SCHEDULE:-0 3 * * *}
    volumes:
      - matrix_backups:/backups
      - synapse_data:/data:ro
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/backup-entrypoint.sh"]
    networks:
      - net

networks:
  net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

volumes:
  synapse_data:
    external: true
    name: synapse_data
  synapse_db:
    external: true
    name: synapse_db
  # Base: plain local volume so matrix runs standalone. The infra override swaps this
  # to an NFS mount on the NAS (see overrides/matrix.override.yaml).
  matrix_backups:
    name: matrix_backups
